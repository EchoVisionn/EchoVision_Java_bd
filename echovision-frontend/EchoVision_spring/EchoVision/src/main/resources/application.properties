spring.application.name=EchoVision
## Porta de acesso ao Projeto
server.port = 8080
# # Configura URL do banco
# # É importante que o MySQL esteja preparado com o banco ante s de executar esse programa
spring.datasource.url=jdbc:mysql://localhost:3307/EchoVision
# # Usuário de acesso
spring.datasource.username=root
# # Senha do banco
spring.datasource.password=MySQL@2022
# # Configura atualizações do banco -> Caso esteja como valor "update" a sua aplicação poderá fazer alterações
# nas tabelas no banco de acordo com o "convencional". Para não permitir is so você pode usar o valor "none".
spring.jpa.hibernate.ddl-auto=update
# #Configuração que mostra que o SQL que foi executado
spring.jpa.properties.hibernate .show_sql=true